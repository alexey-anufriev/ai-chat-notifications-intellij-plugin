name: Release

on: [workflow_dispatch]

permissions:
  contents: write

concurrency:
  group: release-plugin
  cancel-in-progress: false

jobs:
  release:
    name: Publish Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v7.0.0

      - name: Setup Java
        uses: actions/setup-java@v5.4.0
        with:
          distribution: zulu
          java-version: 21

      - name: Resolve Plugin Version
        id: plugin-version
        run: |
          VERSION="$(./gradlew properties --console=plain -q | sed -n 's/^version: //p' | head -n 1)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Run Checks
        run: ./gradlew check

      - name: Upload Test Reports
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/reports/tests

      - name: Verify Plugin
        run: ./gradlew verifyPlugin

      - name: Upload Plugin Verifier Reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-result
          path: ${{ github.workspace }}/build/reports/pluginVerifier

      - name: Publish Plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Create Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.plugin-version.outputs.version }}
          name: ${{ steps.plugin-version.outputs.version }}
          draft: false
          prerelease: false
          files: ./build/distributions/*
